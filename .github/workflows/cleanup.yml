name: Cleanup Workflow Runs

on:
  pull_request:
    types: [closed]
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
    inputs:
      age_threshold:
        description: "Age threshold in hours"
        required: false
        default: "72"
        type: string

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      AGE_THRESHOLD: ${{ github.event.inputs.age_threshold || '72' }}
    steps:
      - name: Delete old workflow runs
        uses: actions/github-script@v7
        with:
          script: |
            const hours = Number(process.env.AGE_THRESHOLD);
            const cutoff = Date.now() - (hours * 60 * 60 * 1000);
            const keepPerWorkflow = 10;

            const workflows = await github.paginate(github.rest.actions.listRepoWorkflows, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            for (const workflow of workflows) {
              const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: workflow.id,
                per_page: 100,
              });

              const sortedRuns = runs
                .filter((run) => run.status === 'completed')
                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

              const protectedRuns = new Set(sortedRuns.slice(0, keepPerWorkflow).map((run) => run.id));

              for (const run of sortedRuns) {
                if (protectedRuns.has(run.id)) {
                  continue;
                }

                if (new Date(run.created_at).getTime() >= cutoff) {
                  continue;
                }

                await github.rest.actions.deleteWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  run_id: run.id,
                });
              }
            }

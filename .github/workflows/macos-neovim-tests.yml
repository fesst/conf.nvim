name: "Neovim Tests (macOS)"

permissions:
  contents: read

on:
  workflow_call:
  push:
    branches: ["master"]
    paths:
      - "infra/**"
      - ".github/workflows/**"
      - "lua/**"
      - "after/**"
      - "init.lua"
      - "lazy-lock.json"
concurrency:
  group: macos-neovim-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 45
    env:
      CI: "true"
      HOMEBREW_NO_AUTO_UPDATE: "1"
      INSTALL_BREW_CASKS: "false"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: macos-npm-${{ hashFiles('infra/packages/npm.sh') }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: macos-pip-${{ hashFiles('infra/packages/pip.sh') }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
          key: macos-cargo-${{ hashFiles('infra/packages/cargo.sh') }}

      - name: Cache Neovim data
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/nvim
            ~/.local/state/nvim
            ~/.cache/nvim
          key: macos-nvim-${{ hashFiles('lazy-lock.json') }}

      - name: Create Python virtual environment
        shell: bash
        run: |
          set -euo pipefail
          python3 -m venv "$RUNNER_TEMP/venv"
          echo "VIRTUAL_ENV=$RUNNER_TEMP/venv" >> "$GITHUB_ENV"
          echo "$RUNNER_TEMP/venv/bin" >> "$GITHUB_PATH"

      - name: Install toolchain and plugins
        shell: bash
        run: |
          set -euo pipefail
          source "$VIRTUAL_ENV/bin/activate"
          ./infra/ci-setup-macos.sh

      - name: Run sanity tests
        shell: bash
        run: |
          set -euo pipefail
          source "$VIRTUAL_ENV/bin/activate"
          ./infra/nvim_sanity_test.sh
